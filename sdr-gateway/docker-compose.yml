services:
  sdr-gateway:
    build: .
    container_name: sdr-gateway
    restart: unless-stopped
    privileged: true
    network_mode: host
    devices:
      - /dev/bus/usb:/dev/bus/usb
    volumes:
      - /dev:/dev
      - /run/udev:/run/udev:ro
    env_file:
      - .env
    group_add:
      - plugdev
